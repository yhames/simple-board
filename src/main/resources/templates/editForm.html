<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>새 글 작성</title>
    <link rel="stylesheet" type="text/css"
          th:href="@{/css/editForm.css}"
          href="../static/css/editForm.css">
</head>
<body>
<div class="form-container">
    <h1>글수정</h1>
    <form th:action="@{/{postId}/edit(postId=${post.id})}" action="post.html" method="post">
        <div class="form-group">
            <input type="text" id="title" name="title" placeholder="제목" th:value="${post.title}"/>
        </div>
        <div class="form-group">
            <textarea id="content" name="content" rows="25" maxlength="10000" th:text="${post.content}"></textarea>
        </div>
        <div class="buttons">
            <button type="submit">수정 완료</button>
        </div>
    </form>
</div>
</body>
</html>
