<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시판</title>
    <link rel="stylesheet" type="text/css"
          th:href="@{/css/index.css}"
          href="../static/css/index.css">
</head>
<body>
<div class="container">
    <h1>게시판</h1>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Content</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="post : ${posts}" th:onclick="|location.href='@{/{postId}(postId=${post.id})}'|" onclick="location.href='post.html'">
            <td th:text="${post.id}">23523</td>
            <td th:text="${post.title}">This is Lorem ipsum</td>
            <td th:text="${post.content}">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Exercitationem
                facere magni minima quis quo sequi, veniam voluptates. Atque earum expedita in ipsam maxime molestiae
                omnis optio possimus qui quisquam, sed.
            </td>
        </tr>
        </tbody>
    </table>
    <button type="button"
            th:onclick="|location.href='@{/new}'|"
            onclick="location.href='newForm.html'">글쓰기</button>
</div>
</body>
</html>
