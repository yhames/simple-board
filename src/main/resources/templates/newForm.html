<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>새 글 작성</title>
    <link rel="stylesheet" type="text/css"
          th:href="@{/css/newform.css}"
          href="../static/css/newform.css">
</head>
<body>
<div class="form-container">
    <h1>글쓰기</h1>
    <form th:action="new" action="index.html" method="post">
        <div class="form-group">
            <input type="text" id="title" name="title" placeholder="제목"/>
        </div>
        <div class="form-group">
            <textarea id="content" name="content" rows="25" maxlength="10000"></textarea>
        </div>
        <div class="buttons">
            <button type="submit">작성 완료</button>
        </div>
    </form>
</div>
</body>
</html>
